<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GramUrja-AI - Smart Energy Management</title>
    
    <!-- Tailwind CSS with Forms and Container Queries -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- React & Related Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7306ef",
                        "accent": "#7306ef",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbars for cleaner prototype */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation, Navigate } = ReactRouterDOM;

        // --- Common Components & Auth ---

        const ThemeToggle = () => {
            const [dark, setDark] = useState(false);
            const toggle = () => {
                const isDark = !dark;
                setDark(isDark);
                document.documentElement.classList.toggle('dark', isDark);
            };
            return (
                <button onClick={toggle} className="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center">
                    <span className="material-symbols-outlined">{dark ? 'light_mode' : 'dark_mode'}</span>
                </button>
            );
        };

        const ProtectedRoute = ({ element }) => {
            const isAuthed = typeof window !== "undefined" && localStorage.getItem("auth") === "true";
            return isAuthed ? element : <Navigate to="/login" replace />;
        };

        const LoginPage = () => {
            const navigate = useNavigate();
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                setTimeout(() => {
                    const ok = email.includes("@") && password.length >= 4;
                    if (ok) {
                        localStorage.setItem("auth", "true");
                        setLoading(false);
                        navigate("/", { replace: true });
                    } else {
                        setLoading(false);
                        setError("Invalid email or password. Please try again.");
                    }
                }, 700);
            };

            return (
                <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-950 px-4">
                    <div class="relative max-w-md w-full">
                        <div class="absolute -inset-[1px] bg-gradient-to-r from-primary to-cyan-400 opacity-60 blur-lg rounded-3xl"></div>
                        <div class="relative bg-white/10 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl p-8 space-y-6">
                            <div class="text-center space-y-2">
                                <h1 class="text-3xl font-extrabold tracking-tight text-white">GramUrja-AI</h1>
                                <p class="text-slate-200 text-sm">Smart Energy Intelligence Platform</p>
                            </div>
                            <form class="space-y-4" onSubmit={handleSubmit}>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-200">Email</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        class="w-full rounded-xl border border-white/20 bg-white/5 px-3 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                        placeholder="you@example.com"
                                        required
                                    />
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-200">Password</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        class="w-full rounded-xl border border-white/20 bg-white/5 px-3 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                                {error && (
                                    <p class="text-xs text-red-300 bg-red-900/40 border border-red-500/40 rounded-lg px-3 py-2">
                                        {error}
                                    </p>
                                )}
                                <button
                                    type="submit"
                                    disabled={loading}
                                    class="w-full inline-flex items-center justify-center rounded-xl bg-primary text-white text-sm font-semibold py-2.5 mt-2 shadow-lg shadow-primary/30 hover:bg-primary/90 disabled:opacity-70 disabled:cursor-not-allowed transition-colors"
                                >
                                    {loading ? "Signing in..." : "Login"}
                                </button>
                            </form>
                            <p class="text-[11px] text-slate-300/90 text-center">
                                Demo login accepts any email and password with at least 4 characters.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = () => {
            const navigate = useNavigate();
            const [notifications, setNotifications] = useState([]);
            const [hasNew, setHasNew] = useState(false);
            const [open, setOpen] = useState(false);
            const [showProfileMenu, setShowProfileMenu] = useState(false);

            useEffect(() => {
                let cancelled = false;
                const fetchRecommendation = () => {
                    fetch("http://127.0.0.1:8001/ai-recommendation")
                        .then((r) => r.json())
                        .then((data) => {
                            if (cancelled) return;
                            if (data && data.id) {
                                const idStr = String(data.id);
                                const lastId = localStorage.getItem("lastAiRecId");
                                if (data.alert && idStr !== lastId) {
                                    const notif = {
                                        id: data.id,
                                        device: data.device,
                                        reason: data.reason,
                                        estimated_savings: data.estimated_savings,
                                        action: data.action,
                                        timestamp: new Date().toLocaleTimeString(),
                                    };
                                    setNotifications((prev) => [notif, ...prev].slice(0, 5));
                                    setHasNew(true);
                                    localStorage.setItem("lastAiRecId", idStr);
                                }
                            }
                        })
                        .catch(() => {});
                };
                fetchRecommendation();
                const interval = setInterval(fetchRecommendation, 60000);
                return () => {
                    cancelled = true;
                    clearInterval(interval);
                };
            }, []);

            const handleLogout = () => {
                localStorage.removeItem("auth");
                navigate("/login", { replace: true });
            };

            const goToScheduling = () => {
                setOpen(false);
                navigate("/scheduling");
            };

            return (
                <header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-6 lg:px-10 py-3 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="bg-primary p-1.5 rounded-lg flex items-center justify-center text-white">
                            <span class="material-symbols-outlined text-2xl">bolt</span>
                        </div>
                        <h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">GramUrja-AI</h2>
                    </div>
                    <div class="flex items-center gap-4 lg:gap-6">
                        <div class="hidden md:flex items-center gap-1 bg-slate-100 dark:bg-slate-800 rounded-full px-3 py-1">
                            <span class="material-symbols-outlined text-sm text-green-500">check_circle</span>
                            <span class="text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider">System Online</span>
                        </div>
                        <div class="flex items-center gap-2 relative">
                            <ThemeToggle />
                            <div class="relative">
                                <button
                                    class="relative p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"
                                    onClick={() => {
                                        setOpen((o) => !o);
                                        setHasNew(false);
                                    }}
                                >
                                    <span class="material-symbols-outlined">notifications</span>
                                    {hasNew && (
                                        <span class="absolute -top-0.5 -right-0.5 h-2.5 w-2.5 rounded-full bg-red-500 border border-white"></span>
                                    )}
                                </button>
                                {open && (
                                    <div class="absolute right-0 mt-2 w-80 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-xl z-20">
                                        <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                            <p class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">
                                                AI Recommendations
                                            </p>
                                            {notifications.length > 0 && (
                                                <span class="text-[10px] text-slate-400">
                                                    {notifications.length} new
                                                </span>
                                            )}
                                        </div>
                                        <div class="max-h-64 overflow-y-auto">
                                            {notifications.length === 0 ? (
                                                <div class="px-4 py-6 text-xs text-slate-500 dark:text-slate-400 text-center">
                                                    No new recommendations.
                                                </div>
                                            ) : (
                                                notifications.map((n) => (
                                                    <div key={n.id} class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 last:border-b-0">
                                                        <p class="text-sm font-semibold text-slate-900 dark:text-white flex items-center gap-1">
                                                            <span class="material-symbols-outlined text-xs text-amber-500">bolt</span>
                                                            Device: {n.device}
                                                        </p>
                                                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">
                                                            {n.reason}
                                                        </p>
                                                        <p class="text-xs text-emerald-600 dark:text-emerald-400 mt-1 font-semibold">
                                                            Estimated savings: {n.estimated_savings}
                                                        </p>
                                                        <div class="mt-2 flex items-center justify-between">
                                                            <span class="text-[10px] text-slate-400">{n.timestamp}</span>
                                                            <button
                                                                onClick={goToScheduling}
                                                                class="text-[11px] font-semibold text-primary hover:underline"
                                                            >
                                                                View Details
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                            <Link to="/settings" class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                                <span class="material-symbols-outlined">settings</span>
                            </Link>
                            <div class="h-8 w-px bg-slate-200 dark:bg-slate-800 mx-2"></div>
                            <div class="relative flex items-center gap-3 pl-2">
                                <div class="text-right hidden sm:block">
                                    <p class="text-sm font-semibold text-slate-900 dark:text-white leading-none">Alex Rivera</p>
                                    <p class="text-[11px] text-slate-500 font-medium">Home Pro Plan</p>
                                </div>
                                <button
                                    onClick={() => setShowProfileMenu((v) => !v)}
                                    class="h-10 w-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden bg-cover bg-center focus:outline-none focus:ring-2 focus:ring-primary"
                                    style={{backgroundImage: "url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-WxgsuWPBjP0OP1xPeBftqYVS66rEp8xTB29WpwPzWvxYjcsALZWkeHWIqMYDnUY812qlFqBAMr8adRRKsYa67ljK9TrO-iB3lLHlSzqCv8ofNqAstmITJjCpdaMpeLbeBSxm5ZdHj026qjrfbMl5F1w6YXMyQbeSwfU80M38CqneVT-JSLySMmXaTibN6FzJhz5A5oz7E-30tuqLyZpZDZHwf6Dlq6_KatwLlKM4CysS2JKmLgeE6bCv3EENwjqvL719iKwxjD6A')"}}
                                >
                                </button>
                                {showProfileMenu && (
                                    <div class="absolute right-0 top-12 w-40 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-lg z-20">
                                        <button
                                            onClick={handleLogout}
                                            class="w-full text-left px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-t-xl"
                                        >
                                            Logout
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Sidebar = () => {
            const location = useLocation();
            const navItems = [
                { path: "/", icon: "dashboard", label: "Overview" },
                { path: "/analytics", icon: "analytics", label: "Analytics" },
                { path: "/forecast", icon: "show_chart", label: "AI Forecast" },
                { path: "/scheduling", icon: "calendar_today", label: "Scheduling" },
                { path: "/tariffs", icon: "payments", label: "Tariffs" },
                { path: "/assistant", icon: "mic", label: "Assistant" },
            ];

            return (
                <aside class="w-full lg:w-64 flex flex-col gap-1">
                    {navItems.map(item => (
                        <Link 
                            key={item.path}
                            to={item.path} 
                            class={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${location.pathname === item.path ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium'}`}
                        >
                            <span class="material-symbols-outlined">{item.icon}</span>
                            <span>{item.label}</span>
                        </Link>
                    ))}
                    <div class="mt-8 px-4">
                        <div class="rounded-xl p-4 border border-primary/20 dark:bg-slate-800/50">
                            <p class="text-primary text-xs font-bold uppercase tracking-widest mb-1">Efficiency Tip</p>
                            <p class="text-slate-700 dark:text-slate-300 text-sm">Schedule laundry for 1 PM to maximize solar utilization.</p>
                        </div>
                    </div>
                </aside>
            );
        };

        // --- Screens ---

        const DashboardOverview = () => {

        const [energy,setEnergy] = React.useState(null);
        const [activeTab, setActiveTab] = React.useState("live");

        // Fake historical + device data for prototype
        const historicalAppliances = [
            { name: "Air Conditioner", kwh: 185, cost: 62.9 },
            { name: "Smart Fridge", kwh: 92, cost: 31.3 },
            { name: "Washing Machine", kwh: 64, cost: 21.8 },
            { name: "Dishwasher", kwh: 42, cost: 14.3 },
            { name: "Water Heater", kwh: 55, cost: 18.7 },
        ];

        const deviceList = [
            { name: "Air Conditioner (Living Room)", power: "2.5 kW", status: "ON" },
            { name: "Smart Fridge", power: "0.18 kW", status: "ON" },
            { name: "Washing Machine", power: "2.0 kW", status: "OFF" },
            { name: "Dishwasher", power: "1.2 kW", status: "OFF" },
            { name: "Water Heater", power: "3.0 kW", status: "ON" },
            { name: "EV Charger", power: "7.0 kW", status: "OFF" },
        ];

        React.useEffect(()=>{

        fetch("http://127.0.0.1:8001/energy/live")
        .then(res=>res.json())
        .then(data=>setEnergy(data));

        },[]);

        const totalKwh = historicalAppliances.reduce((sum, a) => sum + a.kwh, 0);
        const totalCost = historicalAppliances.reduce((sum, a) => sum + a.cost, 0);

        return (
        <div class="flex-1 space-y-8">

        <div class="flex overflow-x-auto pb-2 gap-4 border-b border-slate-200 dark:border-slate-800">
        <button onClick={() => setActiveTab("live")} class={`whitespace-nowrap pb-4 px-2 text-sm font-bold border-b-2 ${activeTab === "live" ? "border-primary text-slate-900 dark:text-white" : "border-transparent text-slate-400 hover:text-slate-600"} transition-colors`}>LIVE MONITOR</button>
        <button onClick={() => setActiveTab("historical")} class={`whitespace-nowrap pb-4 px-2 text-sm font-bold border-b-2 ${activeTab === "historical" ? "border-primary text-slate-900 dark:text-white" : "border-transparent text-slate-400 hover:text-slate-600"} transition-colors`}>HISTORICAL</button>
        <button onClick={() => setActiveTab("devices")} class={`whitespace-nowrap pb-4 px-2 text-sm font-bold border-b-2 ${activeTab === "devices" ? "border-primary text-slate-900 dark:text-white" : "border-transparent text-slate-400 hover:text-slate-600"} transition-colors`}>DEVICES</button>
        </div>

        {activeTab === "live" && (
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 rounded-lg">
        <span class="material-symbols-outlined">light_mode</span>
        </div>
        <span class="text-green-500 text-xs font-bold flex items-center bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded-full">+12.4%</span>
        </div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Solar Generation</p>
        <div class="flex items-baseline gap-1 mt-1">
        <h3 class="text-2xl font-bold text-slate-900 dark:text-white">
        {energy ? energy.solar_generation_kw : "--"}
        </h3>
        <span class="text-slate-400 font-medium">kW</span>
        </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-primary/10 text-primary rounded-lg">
        <span class="material-symbols-outlined">home</span>
        </div>
        <span class="text-red-500 text-xs font-bold flex items-center bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded-full">-3.1%</span>
        </div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Home Consumption</p>
        <div class="flex items-baseline gap-1 mt-1">
        <h3 class="text-2xl font-bold text-slate-900 dark:text-white">
        {energy ? energy.home_consumption_kw : "--"}
        </h3>
        <span class="text-slate-400 font-medium">kW</span>
        </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg">
        <span class="material-symbols-outlined">electrical_services</span>
        </div>
        <span class="text-slate-500 text-xs font-bold flex items-center bg-slate-50 dark:bg-slate-900/20 px-2 py-1 rounded-full">Optimal</span>
        </div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Grid Exporting</p>
        <div class="flex items-baseline gap-1 mt-1">
        <h3 class="text-2xl font-bold text-slate-900 dark:text-white">
        {energy ? energy.grid_export_kw : "--"}
        </h3>
        <span class="text-slate-400 font-medium">kW</span>
        </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-lg">
        <span class="material-symbols-outlined">battery_full</span>
        </div>
        <span class="text-slate-500 text-xs font-bold flex items-center bg-slate-50 dark:bg-slate-900/20 px-2 py-1 rounded-full">Charging</span>
        </div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Battery Reserve</p>
        <div class="flex items-baseline gap-1 mt-1">
        <h3 class="text-2xl font-bold text-slate-900 dark:text-white">
        {energy ? energy.battery_percent : "--"}
        </h3>
        <span class="text-slate-400 font-medium">%</span>
        </div>
        </div>

        </div>
        )}

        {activeTab === "historical" && (
        <div class="space-y-6">
        <div class="flex flex-wrap justify-between items-end gap-4">
        <div>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Historical Energy Consumption</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">From month start till now (simulated data).</p>
        </div>
        <div class="flex gap-4">
        <div class="text-right">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold">Total Consumption</p>
        <p class="text-lg font-bold text-slate-900 dark:text-white">{totalKwh} kWh</p>
        </div>
        <div class="h-10 w-px bg-slate-200 dark:bg-slate-800"></div>
        <div class="text-right">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold">Total Bill</p>
        <p class="text-lg font-bold text-slate-900 dark:text-white">₹{totalCost.toFixed(1)}</p>
        </div>
        </div>
        </div>

        <div class="overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm">
        <table class="min-w-full text-sm">
        <thead class="bg-slate-50 dark:bg-slate-800/60">

            const [isSpeaking, setIsSpeaking] = useState(false);
            const [language, setLanguage] = useState("en");
            const [languages, setLanguages] = useState([{ code: "en", name: "English" }, { code: "hi", name: "Hindi" }, { code: "bn", name: "Bengali" }, { code: "mr", name: "Marathi" }, { code: "te", name: "Telugu" }, { code: "ta", name: "Tamil" }, { code: "gu", name: "Gujarati" }, { code: "ur", name: "Urdu" }, { code: "kn", name: "Kannada" }, { code: "or", name: "Odia" }, { code: "pa", name: "Punjabi" }]);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                fetch("http://127.0.0.1:8001/assistant/languages").then(r => r.json()).then(data => { if (data.languages && data.languages.length) setLanguages(data.languages); }).catch(() => {});
            }, []);

            const langToSpeechCode = { en: "en-IN", hi: "hi-IN", bn: "bn-IN", mr: "mr-IN", te: "te-IN", ta: "ta-IN", gu: "gu-IN", ur: "ur-IN", kn: "kn-IN", or: "or-IN", pa: "pa-IN" };

            const speak = (text) => {
                setIsSpeaking(true);
                if (typeof speechSynthesis === "undefined") {
                    setIsSpeaking(false);
                    return;
                }
                try {
                    speechSynthesis.cancel();
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.rate = 0.95;
                    speech.pitch = 1;

                    // Pick best available voice for selected language, fall back gracefully
                    let targetLang = langToSpeechCode[language] || "en-IN";
                    try {
                        const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
                        if (voices && voices.length) {
                            const exact = voices.find(v => v.lang === targetLang);
                            const baseCode = targetLang.split("-")[0];
                            const base = voices.find(v => v.lang && v.lang.startsWith(baseCode));
                            const english = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
                            const chosen = exact || base || english || voices[0];
                            if (chosen && chosen.lang) {
                                targetLang = chosen.lang;
                            }
                        }
                    } catch (_) {}

                    speech.lang = targetLang;
                    speech.onend = () => setIsSpeaking(false);
                    speech.onerror = () => setIsSpeaking(false);
                    speechSynthesis.speak(speech);
                } catch (e) {
                    console.error("TTS error:", e);
                    setIsSpeaking(false);
                }
            };

            const askAssistant = async (userText) => {
                const text = (userText || msg || "").trim();
                if (!text) return;
                setMsg("");
                setMessages((prev) => [...prev, { role: "user", text: text }]);
                try {
                    const res = await fetch("http://127.0.0.1:8001/assistant/query", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: text, language: language })
                    });
                    const data = await res.json();
                    const responseText = data.response || "Sorry, I could not process that.";
                    setMessages((prev) => [...prev, { role: "assistant", text: responseText }]);
                    speak(responseText);
                } catch (err) {
                    console.error("Assistant error:", err);
                    const errMsg = "Sorry, I could not connect. Please try again.";
                    setMessages((prev) => [...prev, { role: "assistant", text: errMsg }]);
                    speak(errMsg);
                }
            };

            const toggleMic = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Voice input is not supported. Try Chrome. You can type your question instead.");
                    return;
                }
                if (isListening && recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch (_) {}
                    setIsListening(false);
                    recognitionRef.current = null;
                    return;
                }
                try {
                    const recognition = new SpeechRecognition();
                    recognitionRef.current = recognition;
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = langToSpeechCode[language] || "en-IN";
                    recognition.onresult = (e) => {
                        const transcript = (e.results[0] && e.results[0][0]) ? e.results[0][0].transcript : "";
                        if (transcript) askAssistant(transcript);
                    };
                    recognition.onend = () => { setIsListening(false); recognitionRef.current = null; };
                    recognition.onerror = () => { setIsListening(false); recognitionRef.current = null; };
                    recognition.start();
                    setIsListening(true);
                } catch (err) {
                    console.error("Speech recognition error:", err);
                    setIsListening(false);
                    recognitionRef.current = null;
                }
            };

            return (
                <div class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 h-[calc(100vh-160px)]">
                    <div class="flex-1 overflow-y-auto p-6 space-y-6">
                        <div class="max-w-3xl mx-auto text-center mb-8">
                            <h1 class="text-slate-900 dark:text-white text-3xl font-extrabold tracking-tight mb-2">Voice Assistant</h1>
                            <p class="text-slate-500 mb-4">Choose your language, then type or speak your question. Responses will be in the selected language.</p>
                            <div class="flex flex-wrap justify-center gap-2">
                                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Language:</label>
                                <select
                                    value={language}
                                    onChange={(e) => setLanguage(e.target.value)}
                                    class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-white px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary"
                                >
                                    {languages.map(function(l) { return <option key={l.code} value={l.code}>{l.name}</option>; })}
                                </select>
                            </div>
                        </div>
                        {messages.length === 0 && (
                            <div class="flex items-start gap-4 max-w-2xl">
                                <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20"><span class="material-symbols-outlined text-primary">smart_toy</span></div>
                                <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl rounded-tl-none border border-slate-200 dark:border-slate-800 shadow-sm text-slate-800 dark:text-slate-200">
                                    Ask in your language: (1) When will solar generation peak today? (2) When should I run the washing machine? (3) How much electricity cost can I save today?
                                </div>
                            </div>
                        )}
                        {messages.map((m, i) => (
                            <div key={i} class={"flex items-start gap-4 max-w-2xl" + (m.role === "user" ? " ml-auto flex-row-reverse" : "")}>
                                {m.role === "assistant" ? (
                                    <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20"><span class="material-symbols-outlined text-primary">smart_toy</span></div>
                                ) : null}
                                {m.role === "user" ? (
                                    <div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-slate-600">person</span></div>
                                ) : null}
                                <div class={"p-4 rounded-2xl shadow-sm " + (m.role === "user" ? "bg-primary text-white rounded-tr-none" : "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-tl-none text-slate-800 dark:text-slate-200")}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div class="p-6 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
                        <div class="max-w-3xl mx-auto flex flex-col items-center gap-4">
                            <p class="text-sm text-slate-500">{isListening ? "Listening... Speak now" : isSpeaking ? "Speaking..." : "Tap microphone or type to ask (response in selected language)"}</p>
                            <div class="flex items-center gap-3 flex-wrap justify-center">
                                <button
                                    onClick={toggleMic}
                                    class={"flex size-20 items-center justify-center rounded-full shadow-xl transition-all " + (isListening ? "bg-red-500 text-white animate-pulse scale-110" : "bg-primary text-white hover:scale-105 active:scale-95")}
                                    title={isListening ? "Stop listening" : "Start voice input"}
                                >
                                    <span class="material-symbols-outlined text-4xl">mic</span>
                                </button>
                                <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 rounded-full pl-4 pr-2 py-2 border border-slate-200 dark:border-slate-700">
                                    <input
                                        value={msg}
                                        onChange={(e) => setMsg(e.target.value)}
                                        type="text"
                                        placeholder="Type your question..."
                                        class="w-48 sm:w-64 bg-transparent border-none focus:ring-0 text-slate-800 dark:text-white placeholder-slate-400 text-sm"
                                        onKeyDown={(e) => { if (e.key === "Enter") askAssistant(msg); }}
                                    />
                                    <button onClick={() => askAssistant(msg)} class="p-2 rounded-full bg-primary text-white hover:bg-primary/90">
                                        <span class="material-symbols-outlined text-lg">send</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AppLayout = () => {
            const location = useLocation();
            const isLogin = location.pathname === "/login";
            return (
                <div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col">
                    {!isLogin && <Header />}
                    <div class={`flex-1 ${isLogin ? "" : "flex flex-col lg:flex-row max-w-[1600px] mx-auto w-full p-4 lg:p-8 gap-8"}`}>
                        {!isLogin && <Sidebar />}
                        <main class={isLogin ? "flex-1" : "flex-1 overflow-y-auto no-scrollbar"}>
                            <Routes>
                                <Route path="/login" element={<LoginPage />} />
                                <Route path="/" element={<ProtectedRoute element={<DashboardOverview />} />} />
                                <Route path="/analytics" element={<ProtectedRoute element={<AnalyticsPage />} />} />
                                <Route path="/forecast" element={<ProtectedRoute element={<ForecastPage />} />} />
                                <Route path="/scheduling" element={<ProtectedRoute element={<SchedulingPage />} />} />
                                <Route path="/tariffs" element={<ProtectedRoute element={<TariffsPage />} />} />
                                <Route path="/assistant" element={<ProtectedRoute element={<AssistantPage />} />} />
                                <Route path="/settings" element={<ProtectedRoute element={<div className="p-10 text-center text-slate-500">Settings Module Placeholder</div>} />} />
                                <Route path="*" element={<Navigate to="/" replace />} />
                            </Routes>
                        </main>
                    </div>
                    {!isLogin && (
                        <div class="fixed bottom-6 right-6 lg:hidden">
                            <button class="h-14 w-14 rounded-full bg-primary text-white shadow-xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-3xl">add</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => (
            <MemoryRouter>
                <AppLayout />
            </MemoryRouter>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
